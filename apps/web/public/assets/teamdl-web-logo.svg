<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-label="TEAMDL Streaming Bot">
  <defs>
    <linearGradient id="metal" x1="0" x2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".28" stop-color="#9ca3af"/>
      <stop offset=".56" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#6b7280"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" x2="1">
      <stop offset="0" stop-color="#ff2a00"/>
      <stop offset=".45" stop-color="#ff8a00"/>
      <stop offset="1" stop-color="#ff2a00"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 .42 0 0 .18 0 0 0 0 0 0 0 0 .9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".8"/>
    </filter>
  </defs>
  <rect width="1600" height="420" fill="#030303"/>
  <rect x="270" y="84" width="1490" height="250" rx="58" fill="#070707" stroke="#ff3d00" stroke-width="5" opacity=".92" filter="url(#glow)"/>
  <circle cx="230" cy="210" r="170" fill="#050505" stroke="#f4f4f5" stroke-width="4" opacity=".72"/>
  <circle cx="230" cy="210" r="145" fill="#080808" stroke="#ff4d00" stroke-width="8" filter="url(#glow)"/>
  <path d="M54 207c118-54 267-54 398 0v58c-132-50-277-50-398 0z" fill="#101214" stroke="#33383f" stroke-width="4"/>
  <g fill="#030303" opacity=".88">
    <rect x="72" y="218" width="20" height="18"/><rect x="116" y="205" width="20" height="18"/><rect x="160" y="197" width="20" height="18"/>
    <rect x="204" y="195" width="20" height="18"/><rect x="248" y="198" width="20" height="18"/><rect x="292" y="205" width="20" height="18"/>
    <rect x="336" y="218" width="20" height="18"/><rect x="380" y="234" width="20" height="18"/>
  </g>
  <text x="110" y="255" font-family="Impact, Arial Black, Arial, sans-serif" font-size="228" font-style="italic" fill="url(#metal)" stroke="#111" stroke-width="7" filter="url(#shadow)">T</text>
  <text x="255" y="262" font-family="Impact, Arial Black, Arial, sans-serif" font-size="220" font-style="italic" fill="url(#metal)" stroke="#111" stroke-width="7" filter="url(#shadow)">D</text>
  <path d="M285 142 285 278 402 210z" fill="url(#hot)" stroke="#ffb000" stroke-width="4" filter="url(#glow)"/>
  <text x="520" y="185" font-family="Impact, Arial Black, Arial, sans-serif" font-size="142" font-style="italic" fill="url(#metal)" stroke="#111" stroke-width="4" filter="url(#shadow)">TEAM</text>
  <text x="1040" y="185" font-family="Impact, Arial Black, Arial, sans-serif" font-size="142" font-style="italic" fill="url(#hot)" stroke="#3a0800" stroke-width="4" filter="url(#glow)">DL</text>
  <text x="660" y="272" font-family="Arial Black, Arial, sans-serif" font-size="56" letter-spacing="20" fill="#f8fafc" opacity=".92">STREAMING BOT</text>
  <rect x="600" y="314" width="720" height="58" rx="18" fill="#070707" stroke="#ff3d00" stroke-width="3"/>
  <text x="660" y="354" font-family="Arial Black, Arial, sans-serif" font-size="30" fill="#f8fafc">MOVIE</text>
  <text x="860" y="354" font-family="Arial Black, Arial, sans-serif" font-size="30" fill="#f8fafc">SERIES</text>
  <text x="1080" y="354" font-family="Arial Black, Arial, sans-serif" font-size="30" fill="#f8fafc">SHORTS</text>
