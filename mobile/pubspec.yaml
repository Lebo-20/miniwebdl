name: teamdl_app
description: Mobile Application for TEAMDL Short Drama Streaming Platform.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  provider: ^6.1.2

  # Networking & Security
  dio: ^5.4.0
  crypto: ^3.0.3
  uuid: ^4.3.3
  device_info_plus: ^10.1.0
  flutter_secure_storage: ^9.0.0

  # Storage & Preferences
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # UI & Media Caching
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0

  # Video Playback
  video_player: ^2.8.2
  chewie: ^1.7.5

  # Firebase Integrations
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.5
  firebase_messaging: ^14.7.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
